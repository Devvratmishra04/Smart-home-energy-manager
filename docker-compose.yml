version: "3.8"

services:
  # The OpenEnv Environment (FastAPI Server)
  env:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Agent / Inference Script
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "inference.py"]
    depends_on:
      env:
        condition: service_healthy
    environment:
      # Tell the agent to call the local 'env' container instead of Hugging Face
      - ENV_BASE_URL=http://env:8000
      # Pass your HF token so the agent can run
      - HF_TOKEN=${HF_TOKEN}
